<!DOCTYPE html>
<html>
<head>

  <meta charset="utf-8" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

</head>
<style>
  html,
  body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
  }

  body {
    position: fixed;
    inset: 0;
  }

  a-scene {
    position: fixed !important;
    inset: 0;
    width: 100vw !important;
    height: 100vh !important;
  }

  canvas {
    width: 100vw !important;
    height: 100vh !important;
    display: block;
  }

  video {
    object-fit: cover;
  }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 9999;

    display: flex;
    justify-content: center;
    align-items: center;

    background: black;
    color: white;

    font-family: Arial;
  }
</style>

<body>

<a-scene
  embedded
  renderer="precision: mediump; colorManagement: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"

  mindar-image="
    imageTargetSrc: ./targets/targets.mind;
    autoStart: true;
    uiScanning: true;
    uiLoading: true;
  "
>

</body>
</html>
