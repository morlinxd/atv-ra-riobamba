<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1,
    maximum-scale=1,
    user-scalable=no,
    viewport-fit=cover
  "
/>

<title>Hybrid WebAR</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- MINDAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<!-- APP -->
<script defer src="./js/app.js"></script>

<style>

html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

body {
  position: fixed;
  inset: 0;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;

  width: 100vw !important;
  height: 100vh !important;
}

canvas,
video {
  position: fixed !important;
  inset: 0 !important;

  width: 100vw !important;
  height: 100vh !important;

  object-fit: cover !important;
}

</style>

</head>

<body>

<a-scene

  embedded

  color-space="sRGB"

  renderer="
    colorManagement: true;
    physicallyCorrectLights: true;
    precision: mediump;
  "

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"

  mindar-image="
    imageTargetSrc: ./targets/pruebas.mind;
    autoStart: true;
    uiScanning: true;
    uiLoading: true;
    maxTrack: 1;
  "
>

<!-- CAMERA -->

<a-camera
  position="0 0 0"
  look-controls="enabled: false"
></a-camera>

<!-- TARGET 0 -->

<a-entity
  id="target0"
  mindar-image-target="targetIndex: 0"
>
</a-entity>

<!-- TARGET 1 -->

<a-entity
  id="target1"
  mindar-image-target="targetIndex: 1"
>
</a-entity>

<!-- TARGET 2 -->

<a-entity
  id="target2"
  mindar-image-target="targetIndex: 2"
>
</a-entity>

</a-scene>

</body>
</html>
