<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1,
    maximum-scale=1,
    user-scalable=no,
    viewport-fit=cover
  "
/>

<title>MultiTarget WebAR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

body {
  position: fixed;
  inset: 0;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;

  width: 100vw !important;
  height: 100vh !important;
}

canvas,
video {
  position: fixed !important;
  inset: 0 !important;

  width: 100vw !important;
  height: 100vh !important;

  object-fit: cover !important;
}

</style>

</head>

<body>

<a-scene

  embedded

  color-space="sRGB"

  renderer="
    colorManagement: true;
    physicallyCorrectLights: true;
    precision: mediump;
  "

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"

  mindar-image="
    imageTargetSrc: ./targets/targets.mind;
    autoStart: true;
    uiScanning: true;
    uiLoading: true;
    maxTrack: 1;
  "
>

<a-assets>

  <!-- VIDEOS -->

  <video
    id="video0"
    src="./assets/pajaro.mp4"
    loop
    muted
    playsinline
    webkit-playsinline
    crossorigin="anonymous"
  ></video>

  <video
    id="video1"
    src="./assets/izquierda.mp4"
    loop
    muted
    playsinline
    webkit-playsinline
    crossorigin="anonymous"
  ></video>

  <video
    id="video2"
    src="./assets/centro.mp4"
    loop
    muted
    playsinline
    webkit-playsinline
    crossorigin="anonymous"
  ></video>

</a-assets>

<!-- CAMERA -->

<a-camera
  position="0 0 0"
  look-controls="enabled: false"
></a-camera>

<!-- TARGET 0 = PAJARO DERECHA -->

<a-entity id="target0" mindar-image-target="targetIndex: 0">

  <a-video
    src="#video0"
    width="1"
    height="0.6"
    position="0 0 0"
  >
  </a-video>

</a-entity>

<!-- TARGET 1 = IZQUIERDA -->

<a-entity id="target1" mindar-image-target="targetIndex: 1">

  <a-video
    src="#video1"
    width="1"
    height="0.6"
    position="0 0 0"
  >
  </a-video>

</a-entity>

<!-- TARGET 2 = CENTRO -->

<a-entity id="target2" mindar-image-target="targetIndex: 2">

  <a-video
    src="#video2"
    width="1"
    height="0.6"
    position="0 0 0"
  >
  </a-video>

</a-entity>

</a-scene>

<script>

const targets = [
  {
    target: document.querySelector("#target0"),
    video: document.querySelector("#video0"),
  },

  {
    target: document.querySelector("#target1"),
    video: document.querySelector("#video1"),
  },

  {
    target: document.querySelector("#target2"),
    video: document.querySelector("#video2"),
  },
];

targets.forEach((item) => {

  item.target.addEventListener("targetFound", async () => {

    console.log("FOUND");

    // PAUSAR TODOS
    targets.forEach((t) => {
      t.video.pause();
      t.video.currentTime = 0;
    });

    // REPRODUCIR ACTUAL
    await item.video.play();

  });

  item.target.addEventListener("targetLost", () => {

    console.log("LOST");

    item.video.pause();

  });

});

</script>

</body>
</html>
